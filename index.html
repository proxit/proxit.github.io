<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker de Rutinas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor">
        <h1>Mi Tracker de Rutinas</h1>
        
        <!-- Formulario para agregar el progreso -->
        <form id="formulario-rutina">
            <select id="tipo-rutina" required>
                <option value="">Selecciona el día...</option>
                <option value="Torso">Torso</option>
                <option value="Pierna">Pierna</option>
            </select>
            
            <input type="text" id="ejercicio" placeholder="Ej: Prensa" required>
            <input type="number" id="peso" placeholder="Peso (kg)" required>
            
            <button type="submit">Guardar Registro</button>
        </form>

        <!-- Aquí se mostrarán los registros guardados -->
        <h2>Historial de Progreso</h2>
        <ul id="lista-rutinas"></ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
